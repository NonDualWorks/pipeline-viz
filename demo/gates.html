<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pipeline Viz — Gates (Gate + gateActor + Fan-out)</title>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="nav-dot"></div>
    <span class="nav-title">Pipeline Viz</span>
    <span class="nav-badge">Gates</span>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="basics.html">Basics</a>
    <a class="nav-link active" href="gates.html">Gates</a>
    <a class="nav-link" href="failures.html">Failures</a>
    <a class="nav-link" href="java-lib.html">Java Lib</a>
    <a class="nav-link" href="index.html">All</a>
  </div>
</nav>

<div class="main">

  <!-- Controls -->
  <section>
    <div class="sec-title">Animation controls</div>
    <div class="ctrl-panel">
      <div class="ctrl-group">
        <span class="ctrl-lbl">speed</span>
        <input type="range" class="spd-slider" id="spd" min="0.2" max="3" step="0.1" value="1"/>
        <span class="spd-val" id="spd-val">1×</span>
      </div>
      <div class="ctrl-group">
        <div class="pill-grp" id="spd-presets">
          <button class="pill" data-v="0.4">fast</button>
          <button class="pill on" data-v="1">normal</button>
          <button class="pill" data-v="2.5">slow</button>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-lbl">mode</span>
        <div class="pill-grp" id="mode-grp">
          <button class="pill on" data-m="auto">auto</button>
          <button class="pill" data-m="manual">step</button>
        </div>
      </div>
      <button class="btn" id="replay-btn">↺ replay</button>
      <button class="btn btn-adv" id="adv-btn">▶ next job</button>
    </div>
  </section>

  <!-- Scenarios -->
  <section>
    <div class="sec-title">Scenarios — Developer journey (gate + gateActor + fan-out)</div>
    <div class="sc-tabs" id="sc-tabs">
      <button class="sc-tab on" data-s="dj-happy">
        <span class="sc-name">Dev journey</span>
        <span class="sc-sub">gates approve · all pass</span>
      </button>
      <button class="sc-tab" data-s="dj-gate-reject">
        <span class="sc-name">Gate rejected</span>
        <span class="sc-sub">code-review ✗</span>
      </button>
      <button class="sc-tab" data-s="dj-test-fail">
        <span class="sc-name">Test fails</span>
        <span class="sc-sub">unit-tests ✗ → full feedback</span>
      </button>
    </div>
  </section>

  <!-- Status -->
  <div class="status" id="status">
    <div class="s-dot" id="s-dot"></div>
    <span class="s-txt" id="s-txt">initialising…</span>
  </div>

  <!-- Pipeline -->
  <section>
    <div class="sec-title">Live pipeline animation</div>
    <div class="pl-wrap" id="pl-wrap">
      <div class="pv-root" id="pv-root"></div>
    </div>
  </section>

  <!-- Event log -->
  <section>
    <div class="sec-title">Event log</div>
    <div class="evlog" id="evlog">
      <div style="color:var(--subtle)">Waiting for events…</div>
    </div>
  </section>

</div>

<script src="shared.js"></script>
<script>
// ── Scenario data ──
const DJ_BASE = {
  name:'developer-journey', team:'platform', color:'#a78bfa',
  jobs:[
    { name:'code-push', duration:800,
      steps:[
        {label:'get: source',type:'resource',resource_type:'git'},
        {label:'task: lint',type:'task'},
      ]},
    { name:'unit-tests', parallelGroup:'tests', row:0, depends_on:['code-push'], duration:1600,
      steps:[
        {label:'get: source',type:'resource',resource_type:'git'},
        {label:'task: unit suite',type:'task'},
        {label:'task: coverage',type:'task'},
      ]},
    { name:'integ-tests', parallelGroup:'tests', row:1, depends_on:['code-push'], duration:2200,
      steps:[
        {label:'get: source',type:'resource',resource_type:'git'},
        {label:'task: start env',type:'task'},
        {label:'task: integ suite',type:'task'},
        {label:'task: teardown',type:'task'},
      ]},
    { name:'code-review', depends_on:['unit-tests','integ-tests'], duration:1200, gate:'approval', gateDelay:2000,
      steps:[
        {label:'gate: approval',type:'gate'},
        {label:'task: merge check',type:'task'},
      ]},
    { name:'build-image', depends_on:['code-review'], duration:1400,
      steps:[
        {label:'task: docker build',type:'task'},
        {label:'put: app-image',type:'resource',resource_type:'image'},
      ]},
    { name:'deploy-dev', depends_on:['build-image'], duration:1200,
      steps:[
        {label:'get: app-image',type:'resource',resource_type:'image'},
        {label:'task: helm upgrade',type:'task'},
        {label:'task: health check',type:'task'},
      ]},
    { name:'smoke-tests', parallelGroup:'qa', row:0, depends_on:['deploy-dev'], duration:1800,
      steps:[
        {label:'task: smoke suite',type:'task'},
        {label:'task: api checks',type:'task'},
      ]},
    { name:'qa-signoff', parallelGroup:'qa', row:1, depends_on:['deploy-dev'], duration:2200, gate:'approval', gateDelay:1800,
      steps:[
        {label:'gate: approval',type:'gate'},
        {label:'task: qa checklist',type:'task'},
      ]},
    { name:'deploy-staging', depends_on:['smoke-tests','qa-signoff'], duration:1400,
      steps:[
        {label:'get: app-image',type:'resource',resource_type:'image'},
        {label:'task: helm upgrade',type:'task'},
        {label:'task: verify',type:'task'},
      ]},
    { name:'deploy-prod', depends_on:['deploy-staging'], duration:1600,
      steps:[
        {label:'get: app-image',type:'resource',resource_type:'image'},
        {label:'task: helm upgrade',type:'task'},
        {label:'task: health check',type:'task'},
        {label:'put: notify',type:'resource',resource_type:'notify'},
      ]},
    { name:'notify-slack', fanOutGroup:'notify', row:0, depends_on:['deploy-prod'], duration:800,
      steps:[
        {label:'put: slack',type:'resource',resource_type:'notify'},
      ]},
    { name:'update-dashboard', fanOutGroup:'notify', row:1, depends_on:['deploy-prod'], duration:1000,
      steps:[
        {label:'task: update metrics',type:'task'},
        {label:'put: dashboard',type:'resource',resource_type:'notify'},
      ]},
  ]
}

const SCENARIOS = {
  'dj-happy': DJ_BASE,
  'dj-gate-reject': { ...DJ_BASE, name:'dj-gate-rejected',
    jobs: DJ_BASE.jobs.map(j => j.name==='code-review' ? {...j, failAtStep:0} : j) },
  'dj-test-fail': { ...DJ_BASE, name:'dj-test-fails',
    jobs: DJ_BASE.jobs.map(j => j.name==='unit-tests' ? {...j, failAtStep:1} : j) },
}

PV.boot(SCENARIOS, 'dj-happy')
</script>
</body>
</html>
