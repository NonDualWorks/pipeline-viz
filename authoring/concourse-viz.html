<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Concourse Pipeline Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #09090b;
    --surface:      #18181b;
    --surface-high: #27272a;
    --surface-hover:#2d2d30;
    --border:       rgba(255,255,255,0.08);
    --border-bright:rgba(255,255,255,0.16);
    --text:         #f4f4f5;
    --muted:        #a1a1aa;
    --subtle:       #71717a;
    --accent:       #10b981;
    --accent-dim:   rgba(16,185,129,0.12);

    /* Concourse exact state colors */
    --cc-idle:      #3d3d3d;
    --cc-pending:   #8b572a;
    --cc-running:   #f5a623;
    --cc-succeeded: #11c560;
    --cc-failed:    #ed4b35;
    --cc-paused:    #3d7be0;

    /* Resource type colors */
    --rc-git:           #f5a623;
    --rc-registry-image:#38bdf8;
    --rc-docker-image:  #38bdf8;
    --rc-s3:            #fbbf24;
    --rc-slack:         #10b981;
    --rc-time:          #a78bfa;
    --rc-semver:        #a78bfa;
    --rc-github-release:#f5a623;
    --rc-unknown:       #71717a;

    --font-sans: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --shadow: 0 0 0 1px rgba(255,255,255,0.05),
              0 4px 6px -1px rgba(0,0,0,0.5),
              0 20px 40px -8px rgba(0,0,0,0.6);
  }

  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ─────────────────────────────────────── */
  .nav {
    height: 52px;
    background: rgba(9,9,11,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  .nav-left { display: flex; align-items: center; gap: 10px; }
  .nav-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .nav-title {
    font-size: 15px; font-weight: 600;
    letter-spacing: -0.02em; color: var(--text);
  }
  .nav-sub {
    font-size: 11px; font-family: var(--font-mono);
    color: var(--subtle);
    background: var(--surface-high);
    padding: 2px 8px; border-radius: 4px;
    border: 1px solid var(--border);
  }
  .nav-right { display: flex; align-items: center; gap: 8px; }

  /* ── LAYOUT ──────────────────────────────────── */
  .workspace {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  /* ── LEFT PANEL ──────────────────────────────── */
  .panel-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 52px);
    position: sticky;
    top: 52px;
    overflow-y: auto;
  }
  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-high);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-label {
    font-size: 10px; font-family: var(--font-mono);
    color: var(--subtle); text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .editor-area {
    flex: 1;
    padding: 0;
    position: relative;
  }
  textarea {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    border: none;
    outline: none;
    resize: none;
    padding: 16px;
    tab-size: 2;
  }
  textarea::placeholder { color: var(--subtle); opacity: 0.5; }

  .panel-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface-high);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ── BUTTONS ─────────────────────────────────── */
  .btn {
    font-size: 11px; font-family: var(--font-mono);
    padding: 6px 12px; border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-primary {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: rgba(16,185,129,0.3);
  }
  .btn-primary:hover { background: rgba(16,185,129,0.2); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
  }
  .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
  .btn-danger {
    background: transparent;
    color: #f87171;
    border-color: rgba(248,113,113,0.2);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }

  /* ── RIGHT PANEL ─────────────────────────────── */
  .panel-right {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .viz-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-high);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .viz-controls { display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-text {
    font-size: 11px; font-family: var(--font-mono); color: var(--subtle);
  }
  .viz-canvas {
    flex: 1;
    padding: 24px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── EMPTY STATE ─────────────────────────────── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--subtle);
    padding: 40px;
    text-align: center;
  }
  .empty-icon { font-size: 32px; opacity: 0.4; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--muted); }
  .empty-sub { font-size: 12px; font-family: var(--font-mono); line-height: 1.6; }

  /* ── ERROR STATE ─────────────────────────────── */
  .error-banner {
    margin: 16px 20px 0;
    padding: 10px 14px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: #f87171;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  /* ── PIPELINE BLOCK ──────────────────────────── */
  .pipeline-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: border-color 0.3s;
  }
  .pipeline-block.active { border-color: rgba(16,185,129,0.3); }

  .pipeline-header {
    padding: 10px 16px;
    background: var(--surface-high);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pipeline-indicator {
    width: 6px; height: 6px; border-radius: 50%;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .pipeline-team {
    font-size: 11px; font-family: var(--font-mono);
    font-weight: 600; color: var(--text);
  }
  .pipeline-sep { font-size: 11px; font-family: var(--font-mono); color: var(--subtle); }
  .pipeline-name { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }
  .pipeline-waiting {
    margin-left: auto;
    font-size: 9px; font-family: var(--font-mono);
    color: #8b572a;
    background: rgba(139,87,42,0.15);
    padding: 2px 7px; border-radius: 3px;
  }

  .pipeline-body {
    padding: 16px;
    overflow-x: auto;
  }

  /* ── JOBS ROW ────────────────────────────────── */
  .jobs-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
    min-width: max-content;
  }

  /* ── CONNECTOR ───────────────────────────────── */
  .connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    flex-shrink: 0;
    margin-top: 18px;
    gap: 3px;
  }
  .connector-line {
    height: 2px; width: 20px;
    background: var(--cc-idle);
    transition: background 0.4s;
    position: relative;
    overflow: hidden;
  }
  .connector-line.active { background: var(--cc-succeeded); }
  .connector-line.active::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: flow 1s linear infinite;
  }

  /* ── JOB BOX ─────────────────────────────────── */
  .job-box {
    width: 140px;
    border: 2px solid var(--cc-idle);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .job-box.state-pending  { border-color: var(--cc-pending); }
  .job-box.state-running  {
    border-color: var(--cc-running);
    box-shadow: 0 0 14px rgba(245,166,35,0.3);
  }
  .job-box.state-succeeded {
    border-color: var(--cc-succeeded);
    box-shadow: 0 0 8px rgba(17,197,96,0.2);
  }
  .job-box.state-failed   {
    border-color: var(--cc-failed);
    box-shadow: 0 0 8px rgba(237,75,53,0.2);
  }

  .job-header {
    padding: 5px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.3s;
  }
  .job-box.state-running  .job-header { background: rgba(245,166,35,0.12); }
  .job-box.state-succeeded .job-header { background: rgba(17,197,96,0.10); }

  .job-state-icon { flex-shrink: 0; width: 10px; height: 10px; }
  .job-name {
    font-size: 11px; font-family: var(--font-mono);
    font-weight: 600; color: var(--subtle);
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.3s;
  }
  .job-box.state-running   .job-name { color: #f5a623; }
  .job-box.state-succeeded .job-name { color: var(--text); }

  .job-steps { padding: 5px 6px; display: flex; flex-direction: column; gap: 2px; }

  /* ── STEP ROW ────────────────────────────────── */
  .step-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 4px;
    border-radius: 3px;
    opacity: 0.3;
    transition: opacity 0.2s, background 0.2s;
  }
  .step-row.state-running  { opacity: 1; background: rgba(255,255,255,0.04); }
  .step-row.state-done     { opacity: 1; }

  .step-indicator { flex-shrink: 0; width: 8px; height: 8px; }
  .step-label {
    font-size: 9px; font-family: var(--font-mono);
    color: var(--subtle);
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
    transition: color 0.2s;
  }
  .step-row.state-done .step-label { color: var(--muted); }
  .step-row.state-running .step-label { color: var(--text); }

  /* ── SPINNER ─────────────────────────────────── */
  .spinner {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid rgba(245,166,35,0.3);
    border-top-color: #f5a623;
    animation: spin 0.7s linear infinite;
  }

  /* ── RESOURCE CIRCLE ─────────────────────────── */
  .resource-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow 0.3s;
  }
  .step-row.state-done .resource-dot {
    box-shadow: 0 0 4px currentColor;
  }

  /* ── CHECKMARK ───────────────────────────────── */
  .check { color: var(--cc-succeeded); font-size: 9px; line-height: 1; }
  .dot-idle {
    width: 6px; height: 6px; border-radius: 2px;
    background: var(--cc-idle);
  }

  /* ── VIZ JSON PANEL ──────────────────────────── */
  .json-panel {
    margin: 0 24px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .json-header {
    padding: 8px 14px;
    background: var(--surface-high);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .json-body {
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    white-space: pre;
    overflow-x: auto;
    max-height: 200px;
    overflow-y: auto;
    display: none;
  }
  .json-body.visible { display: block; }

  /* ── LEGEND ──────────────────────────────────── */
  .legend {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface-high);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .legend-label { font-size: 9px; font-family: var(--font-mono); color: var(--subtle); }

  /* ── ANIMATIONS ──────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes flow {
    0%   { left: -100%; }
    100% { left: 100%; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  /* ── EXPORT CONFIG ───────────────────────────────── */
  .export-config {
    padding: 10px 16px 0;
    border-top: 1px solid var(--border);
  }
  .export-config-title {
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--subtle);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .export-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .export-field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .export-field label {
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--subtle);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .export-field input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 7px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .export-field input[type="text"]:focus {
    border-color: var(--accent);
    color: var(--text);
  }
  .color-row {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .color-row input[type="text"] { flex: 1; }
  .color-row input[type="color"] {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px;
    background: var(--bg);
    cursor: pointer;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="nav-dot"></div>
    <span class="nav-title">Pipeline Viz</span>
    <span class="nav-sub">Concourse YAML → Animation</span>
  </div>
  <div class="nav-right">
    <button class="btn btn-ghost" onclick="loadExample('simple')">Simple example</button>
    <button class="btn btn-ghost" onclick="loadExample('full')">Full golden path</button>
  </div>
</nav>

<div class="workspace">

  <!-- LEFT: YAML editor -->
  <div class="panel-left">
    <div class="panel-header">
      <span class="panel-label">Concourse Pipeline YAML</span>
      <span class="panel-label" id="parse-status" style="color:var(--subtle)">—</span>
    </div>
    <div class="editor-area">
      <textarea id="yaml-input" placeholder="Paste your Concourse pipeline YAML here...

Example:
---
resources:
  - name: app-source
    type: git
    source:
      uri: https://github.com/org/repo

jobs:
  - name: build
    plan:
      - get: app-source
        trigger: true
      - task: compile
      - task: unit-test

  - name: deploy
    plan:
      - get: app-source
        passed: [build]
      - task: deploy-to-dev" spellcheck="false"></textarea>
    </div>
    <div class="export-config" id="export-config" style="display:none">
      <div class="export-config-title">Export settings</div>
      <div class="export-fields">
        <div class="export-field">
          <label>Export name</label>
          <input id="exp-varname" type="text" placeholder="myPipeline" value="myPipeline" spellcheck="false"/>
        </div>
        <div class="export-field">
          <label>Pipeline name</label>
          <input id="exp-name" type="text" placeholder="my-pipeline" spellcheck="false"/>
        </div>
        <div class="export-field">
          <label>Team</label>
          <input id="exp-team" type="text" placeholder="my-team" value="my-team" spellcheck="false"/>
        </div>
        <div class="export-field export-field-color">
          <label>Color</label>
          <div class="color-row">
            <input id="exp-color" type="text" placeholder="#10b981" value="#10b981" spellcheck="false" oninput="syncColorPicker()"/>
            <input id="exp-color-picker" type="color" value="#10b981" oninput="syncColorText()"/>
          </div>
        </div>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn btn-primary" onclick="parseAndRender()">▶ Parse + Animate</button>
      <button class="btn btn-ghost" onclick="replayAnimation()">↺ Replay</button>
      <button class="btn btn-ghost" onclick="toggleJson()">{ } preview</button>
      <button class="btn btn-ghost" onclick="downloadJs()" id="dl-btn" style="display:none">↓ Download .js</button>
    </div>
  </div>

  <!-- RIGHT: Visualization -->
  <div class="panel-right">
    <div class="viz-header">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="status-dot" id="status-dot" style="background:var(--cc-idle)"></div>
        <span class="status-text" id="status-text">paste yaml and click parse</span>
      </div>
      <div class="viz-controls">
        <span class="panel-label" id="pipeline-count" style="display:none"></span>
      </div>
    </div>

    <div id="error-banner" style="display:none"></div>

    <div class="viz-canvas" id="viz-canvas">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">No pipeline yet</div>
        <div class="empty-sub">Paste a Concourse pipeline YAML on the left<br>then click Parse + Animate</div>
      </div>
    </div>

    <div class="json-panel" id="json-panel" style="display:none">
      <div class="json-header">
        <span class="panel-label" id="json-panel-title">.js module preview</span>
        <button class="btn btn-ghost" onclick="toggleJson()" style="padding:2px 8px;font-size:10px">close</button>
      </div>
      <div class="json-body visible" id="json-body"></div>
    </div>

    <div class="legend">
      <span class="panel-label" style="margin-right:4px">states:</span>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cc-idle)"></div><span class="legend-label">idle</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cc-pending)"></div><span class="legend-label">pending</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cc-running)"></div><span class="legend-label">running</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cc-succeeded)"></div><span class="legend-label">succeeded</span></div>
      <span class="panel-label" style="margin-left:8px;margin-right:4px">resources:</span>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rc-git);border-radius:50%"></div><span class="legend-label">git</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rc-registry-image);border-radius:50%"></div><span class="legend-label">image</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rc-s3);border-radius:50%"></div><span class="legend-label">s3</span></div>
    </div>
  </div>
</div>

<script>
// ── EXAMPLES ──────────────────────────────────────────────────────
const EXAMPLES = {
  simple: `---
jobs:
  - name: job
    public: true
    plan:
      - task: simple-task
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: busybox }
          run:
            path: echo
            args: ["Hello world!"]`,

  full: `---
resources:
  - name: app-source
    type: git
    source:
      uri: https://github.com/org/java-app
      branch: main

  - name: app-image
    type: registry-image
    source:
      repository: registry.example.com/app

  - name: version
    type: semver
    source:
      driver: s3
      bucket: my-versions

jobs:
  - name: test
    plan:
      - get: app-source
        trigger: true
      - task: unit-tests
      - task: gradle-build

  - name: scan
    plan:
      - get: app-source
        passed: [test]
      - get: app-image
        passed: [test]
      - task: trivy-scan
      - task: sarif-report
      - task: compliance-gate

  - name: publish
    plan:
      - get: app-source
        passed: [scan]
      - get: version
      - task: build-final-image
      - put: app-image
      - put: version

  - name: deploy-dev
    plan:
      - get: app-image
        passed: [publish]
        trigger: true
      - task: helm-upgrade-dev
      - task: health-check

  - name: deploy-staging
    plan:
      - get: app-image
        passed: [deploy-dev]
      - task: helm-upgrade-staging
      - task: smoke-tests`
};

// ── RESOURCE TYPE COLOR MAP ────────────────────────────────────────
const RESOURCE_COLORS = {
  'git':             '#f5a623',
  'registry-image':  '#38bdf8',
  'docker-image':    '#38bdf8',
  's3':              '#fbbf24',
  'semver':          '#a78bfa',
  'time':            '#a78bfa',
  'slack-notification':'#10b981',
  'github-release':  '#f5a623',
  'unknown':         '#71717a',
};

function getResourceColor(type) {
  return RESOURCE_COLORS[type] || RESOURCE_COLORS.unknown;
}

// ── PARSER ─────────────────────────────────────────────────────────
function parsePipeline(yamlText) {
  const pipeline = jsyaml.load(yamlText);
  if (!pipeline) throw new Error('Empty YAML');
  if (!pipeline.jobs || !Array.isArray(pipeline.jobs)) {
    throw new Error('No "jobs" array found in pipeline YAML');
  }

  // Build resource type lookup: name → type
  const resourceTypes = {};
  for (const r of (pipeline.resources || [])) {
    if (r.name && r.type) resourceTypes[r.name] = r.type;
  }

  // Parse each job
  const jobs = pipeline.jobs.map(job => {
    const steps = extractSteps(job.plan || [], resourceTypes);
    const dependsOn = extractDependencies(job.plan || []);
    return {
      name: job.name,
      steps,
      depends_on: dependsOn.length > 0 ? dependsOn : undefined,
    };
  });

  return {
    resources: resourceTypes,
    jobs,
    _raw_name: pipeline.name || null,
  };
}

function extractSteps(plan, resourceTypes) {
  const steps = [];
  for (const step of (plan || [])) {
    if (!step) continue;

    if (step.get !== undefined) {
      const rtype = resourceTypes[step.get] || 'unknown';
      steps.push({
        label: `get: ${step.get}`,
        type: 'resource',
        resource_type: rtype,
      });
    } else if (step.put !== undefined) {
      const rtype = resourceTypes[step.put] || 'unknown';
      steps.push({
        label: `put: ${step.put}`,
        type: 'resource',
        resource_type: rtype,
      });
    } else if (step.task !== undefined) {
      steps.push({
        label: `task: ${step.task}`,
        type: 'task',
      });
    } else if (step.set_pipeline !== undefined) {
      steps.push({
        label: `set_pipeline: ${step.set_pipeline}`,
        type: 'task',
      });
    } else if (step.in_parallel !== undefined) {
      // Flatten parallel steps
      const inner = Array.isArray(step.in_parallel)
        ? step.in_parallel
        : (step.in_parallel.steps || []);
      steps.push(...extractSteps(inner, resourceTypes));
    } else if (step.do !== undefined) {
      steps.push(...extractSteps(step.do, resourceTypes));
    } else if (step.try !== undefined) {
      steps.push(...extractSteps([step.try.step || step.try], resourceTypes));
    } else if (step.across !== undefined) {
      // Concourse across step — treat as task
      steps.push({ label: 'across: (parallel matrix)', type: 'task' });
    }
  }
  return steps;
}

function extractDependencies(plan) {
  // Collect all "passed" arrays from get steps
  const deps = new Set();
  for (const step of (plan || [])) {
    if (!step) continue;
    if (step.get !== undefined && step.passed) {
      for (const d of step.passed) deps.add(d);
    }
    // Recurse into in_parallel and do blocks
    const inner = step.in_parallel
      ? (Array.isArray(step.in_parallel) ? step.in_parallel : step.in_parallel.steps || [])
      : step.do || [];
    if (inner.length) {
      for (const d of extractDependencies(inner)) deps.add(d);
    }
  }
  return [...deps];
}

// ── ORDER JOBS by dependency graph ────────────────────────────────
function orderJobs(jobs) {
  // Topological sort so we render left-to-right in dependency order
  const result = [];
  const visited = new Set();
  const nameMap = {};
  jobs.forEach(j => nameMap[j.name] = j);

  function visit(job) {
    if (visited.has(job.name)) return;
    visited.add(job.name);
    for (const dep of (job.depends_on || [])) {
      if (nameMap[dep]) visit(nameMap[dep]);
    }
    result.push(job);
  }
  jobs.forEach(j => visit(j));
  return result;
}

// ── GLOBAL STATE ───────────────────────────────────────────────────
let currentViz = null;
let animTimers = [];
let jobStates = {};
let stepStates = {};

// ── RENDER ─────────────────────────────────────────────────────────
function parseAndRender() {
  const yaml = document.getElementById('yaml-input').value.trim();
  if (!yaml) return;

  clearError();
  try {
    const viz = parsePipeline(yaml);
    currentViz = viz;
    renderViz(viz);
    setStatus('idle', 'ready — click ↺ Replay to animate');
    document.getElementById('dl-btn').style.display = 'inline-flex';
    document.getElementById('export-config').style.display = 'block';
    // Auto-fill pipeline name from YAML if exp-name is empty
    const nameField = document.getElementById('exp-name');
    if (nameField && !nameField.value && viz._raw_name) {
      nameField.value = viz._raw_name;
      document.getElementById('exp-varname').value = viz._raw_name
        .replace(/[^a-z0-9]/gi, '_').replace(/^[0-9]/, '_$&');
    }
    // Update JSON panel if open
    updateJsonPanel(viz);
  } catch(e) {
    showError(e.message);
    setStatus('failed', 'parse error');
  }
}

function renderViz(viz) {
  const canvas = document.getElementById('viz-canvas');
  document.getElementById('empty-state')?.remove();
  canvas.innerHTML = '';

  const orderedJobs = orderJobs(viz.jobs);

  // Group jobs into "pipelines" based on name convention or just show as one
  // For simplicity: all jobs in one pipeline block
  // (multi-pipeline grouping can be added later)
  const pipelineName = viz._raw_name || 'pipeline';

  const block = document.createElement('div');
  block.className = 'pipeline-block';
  block.id = 'pipeline-block-0';

  block.innerHTML = `
    <div class="pipeline-header">
      <div class="pipeline-indicator" id="pi-0" style="background:var(--cc-idle)"></div>
      <span class="pipeline-team">team</span>
      <span class="pipeline-sep">/</span>
      <span class="pipeline-name">${pipelineName}</span>
    </div>
    <div class="pipeline-body">
      <div class="jobs-row" id="jobs-row-0"></div>
    </div>
  `;
  canvas.appendChild(block);

  const jobsRow = block.querySelector('#jobs-row-0');

  // Build name→index map for depends_on
  const jobIndex = {};
  orderedJobs.forEach((j, i) => jobIndex[j.name] = i);

  orderedJobs.forEach((job, idx) => {
    // Connector before job (if depends on previous)
    if (idx > 0) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.innerHTML = `<div class="connector-line" id="conn-0-${idx}"></div>`;
      jobsRow.appendChild(conn);
    }

    // Job box
    const box = document.createElement('div');
    box.className = 'job-box state-idle';
    box.id = `job-0-${idx}`;

    const stepsHtml = job.steps.map((step, si) => {
      const isResource = step.type === 'resource';
      const color = isResource ? getResourceColor(step.resource_type) : null;
      const indicatorHtml = isResource
        ? `<div class="resource-dot step-indicator" id="step-dot-0-${idx}-${si}"
              style="background:${color};color:${color}"></div>`
        : `<div class="dot-idle step-indicator" id="step-dot-0-${idx}-${si}"></div>`;

      return `
        <div class="step-row" id="step-0-${idx}-${si}">
          ${indicatorHtml}
          <span class="step-label">${step.label}</span>
        </div>`;
    }).join('');

    box.innerHTML = `
      <div class="job-header">
        <div class="job-state-icon" id="job-icon-0-${idx}">
          <div class="dot-idle"></div>
        </div>
        <span class="job-name">${job.name}</span>
      </div>
      <div class="job-steps">${stepsHtml}</div>
    `;
    jobsRow.appendChild(box);
  });

  // Update pipeline count
  const countEl = document.getElementById('pipeline-count');
  countEl.textContent = `${orderedJobs.length} job${orderedJobs.length !== 1 ? 's' : ''}`;
  countEl.style.display = 'inline';

  // Initialize state maps
  jobStates = {};
  stepStates = {};
  orderedJobs.forEach((j, i) => {
    jobStates[`0-${i}`] = 'idle';
    stepStates[`0-${i}`] = j.steps.map(() => 'idle');
  });

  // Auto-play
  setTimeout(() => runAnimation(orderedJobs), 500);
}

// ── ANIMATION ENGINE ───────────────────────────────────────────────
function runAnimation(jobs) {
  clearTimers();
  resetVisualState(jobs);
  setStatus('running', 'running…');
  setDotColor(document.getElementById('status-dot'), '#f5a623', true);
  document.getElementById('pipeline-block-0')?.classList.add('active');

  const orderedJobs = jobs || (currentViz ? orderJobs(currentViz.jobs) : []);
  let cursor = 300;

  // Build dependency graph: job name → earliest start time
  const jobStartTimes = {};
  const jobEndTimes = {};

  // First pass: calculate timing based on dependency ordering
  orderedJobs.forEach((job, idx) => {
    // Start after all dependencies are done
    let earliestStart = cursor;
    for (const dep of (job.depends_on || [])) {
      const depIdx = orderedJobs.findIndex(j => j.name === dep);
      if (depIdx >= 0 && jobEndTimes[depIdx] !== undefined) {
        earliestStart = Math.max(earliestStart, jobEndTimes[depIdx] + 300);
      }
    }

    jobStartTimes[idx] = earliestStart;
    const jobDuration = 400 + job.steps.length * 500 + 200;
    jobEndTimes[idx] = earliestStart + jobDuration;

    // If no dependencies, advance cursor for next independent job
    if (!job.depends_on || job.depends_on.length === 0) {
      cursor = earliestStart + 200; // stagger independent jobs slightly
    }
  });

  // Calculate total duration
  const totalDuration = Math.max(...Object.values(jobEndTimes));

  orderedJobs.forEach((job, idx) => {
    const start = jobStartTimes[idx];

    // Job goes pending
    addTimer(() => setJobState(idx, 'pending'), start - 200);

    // Connector activates (check dependencies)
    if (idx > 0) {
      addTimer(() => {
        const connEl = document.getElementById(`conn-0-${idx}`);
        if (connEl) connEl.classList.add('active');
      }, start - 100);
    }

    // Job starts running
    addTimer(() => setJobState(idx, 'running'), start);

    // Steps run sequentially within job
    let stepCursor = start + 200;
    const stepDuration = Math.max(300, (jobEndTimes[idx] - start - 400) / job.steps.length);

    job.steps.forEach((step, si) => {
      addTimer(() => setStepState(idx, si, 'running'), stepCursor);
      stepCursor += stepDuration * 0.65;
      addTimer(() => setStepState(idx, si, 'done'), stepCursor);
      stepCursor += stepDuration * 0.35;
    });

    // Job succeeds
    addTimer(() => setJobState(idx, 'succeeded'), jobEndTimes[idx]);
  });

  // All done
  addTimer(() => {
    setStatus('succeeded', `✓ complete · ${orderedJobs.length} jobs`);
    setDotColor(document.getElementById('status-dot'), '#11c560', false);
    document.getElementById('pipeline-block-0')?.classList.remove('active');
    // Auto-replay
    addTimer(() => replayAnimation(), totalDuration + 3500);
  }, totalDuration + 300);
}

function replayAnimation() {
  if (!currentViz) return;
  clearTimers();
  const orderedJobs = orderJobs(currentViz.jobs);
  resetVisualState(orderedJobs);
  setTimeout(() => runAnimation(orderedJobs), 200);
}

function resetVisualState(jobs) {
  jobs.forEach((job, idx) => {
    setJobState(idx, 'idle');
    job.steps.forEach((_, si) => setStepState(idx, si, 'idle'));
    const conn = document.getElementById(`conn-0-${idx}`);
    if (conn) conn.classList.remove('active');
  });
  setDotColor(document.getElementById('pi-0'), '#3d3d3d', false);
}

// ── STATE SETTERS ──────────────────────────────────────────────────
function setJobState(idx, state) {
  const box = document.getElementById(`job-0-${idx}`);
  if (!box) return;
  box.className = `job-box state-${state}`;

  const icon = document.getElementById(`job-icon-0-${idx}`);
  if (!icon) return;
  if (state === 'running') {
    icon.innerHTML = '<div class="spinner"></div>';
  } else if (state === 'succeeded') {
    icon.innerHTML = `<span style="color:var(--cc-succeeded);font-size:10px">✓</span>`;
  } else if (state === 'failed') {
    icon.innerHTML = `<span style="color:var(--cc-failed);font-size:10px">✗</span>`;
  } else if (state === 'pending') {
    icon.innerHTML = `<div style="width:8px;height:8px;border-radius:2px;background:var(--cc-pending)"></div>`;
  } else {
    icon.innerHTML = `<div class="dot-idle"></div>`;
  }

  // Pipeline indicator
  const pi = document.getElementById('pi-0');
  if (pi) {
    if (state === 'running')   setDotColor(pi, '#f5a623', true);
    if (state === 'succeeded') setDotColor(pi, '#11c560', false);
  }
}

function setStepState(jobIdx, stepIdx, state) {
  const row = document.getElementById(`step-0-${jobIdx}-${stepIdx}`);
  if (!row) return;
  row.className = `step-row state-${state}`;

  const dot = document.getElementById(`step-dot-0-${jobIdx}-${stepIdx}`);
  if (!dot) return;

  if (state === 'running') {
    // If resource dot, keep color; if task dot, replace with spinner
    const isResource = dot.classList.contains('resource-dot');
    if (!isResource) {
      dot.outerHTML = `<div class="spinner step-indicator" id="step-dot-0-${jobIdx}-${stepIdx}"></div>`;
    }
  } else if (state === 'done') {
    const isResource = dot.classList.contains('resource-dot');
    if (isResource) {
      // Keep resource dot, add glow already handled by CSS
    } else {
      // Replace spinner/dot with checkmark
      dot.outerHTML = `<span class="check step-indicator" id="step-dot-0-${jobIdx}-${stepIdx}">✓</span>`;
    }
  }
}

function setDotColor(el, color, pulse) {
  if (!el) return;
  el.style.background = color;
  el.style.boxShadow = pulse ? `0 0 6px ${color}` : 'none';
  el.style.animation = pulse ? 'pulse 1s ease-in-out infinite' : 'none';
}

// ── TIMER HELPERS ──────────────────────────────────────────────────
function addTimer(fn, delay) {
  animTimers.push(setTimeout(fn, delay));
}
function clearTimers() {
  animTimers.forEach(clearTimeout);
  animTimers = [];
}

// ── STATUS ─────────────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  const colors = {
    idle: '#3d3d3d', running: '#f5a623',
    succeeded: '#11c560', failed: '#ed4b35'
  };
  setDotColor(dot, colors[state] || '#3d3d3d', state === 'running');
}

function showError(msg) {
  const banner = document.getElementById('error-banner');
  banner.textContent = `Parse error: ${msg}`;
  banner.style.display = 'block';
  document.getElementById('pipeline-count').style.display = 'none';
}
function clearError() {
  document.getElementById('error-banner').style.display = 'none';
}

// ── EXPORT CONFIG HELPERS ──────────────────────────────────────────
function getExportConfig() {
  const rawName = document.getElementById('yaml-input').value;
  // Try to infer pipeline name from YAML if not set
  const autoName = (currentViz?._raw_name || '').replace(/[^a-z0-9-_]/gi, '-').toLowerCase() || 'my-pipeline';
  return {
    varName:  document.getElementById('exp-varname')?.value.trim() || 'myPipeline',
    name:     document.getElementById('exp-name')?.value.trim()    || autoName,
    team:     document.getElementById('exp-team')?.value.trim()    || 'my-team',
    color:    document.getElementById('exp-color')?.value.trim()   || '#10b981',
  };
}

function buildJsModule(viz, cfg) {
  const data = {
    name:      cfg.name,
    team:      cfg.team,
    color:     cfg.color,
    resources: viz.resources,
    jobs:      viz.jobs,
  };
  return `// Generated by concourse-viz
// Source: Concourse pipeline YAML → pipeline-viz-slides
// Drop this file in your Slidev project's data/ folder

export const ${cfg.varName} = ${JSON.stringify(data, null, 2)};
`;
}

function syncColorPicker() {
  const text   = document.getElementById('exp-color');
  const picker = document.getElementById('exp-color-picker');
  if (text && picker && /^#[0-9a-f]{6}$/i.test(text.value)) {
    picker.value = text.value;
  }
  if (currentViz) updateJsonPanel(currentViz);
}

function syncColorText() {
  const text   = document.getElementById('exp-color');
  const picker = document.getElementById('exp-color-picker');
  if (text && picker) text.value = picker.value;
  if (currentViz) updateJsonPanel(currentViz);
}

// ── JSON PANEL ─────────────────────────────────────────────────────
function toggleJson() {
  const panel = document.getElementById('json-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (currentViz) updateJsonPanel(currentViz);
}

function updateJsonPanel(viz) {
  const cfg = getExportConfig();
  document.getElementById('json-body').textContent = buildJsModule(viz, cfg);
}

function downloadJs() {
  if (!currentViz) return;
  const cfg    = getExportConfig();
  const output = buildJsModule(currentViz, cfg);
  const fname  = (cfg.varName || 'my-pipeline').replace(/[^a-z0-9-_]/gi, '-').toLowerCase();
  const blob   = new Blob([output], { type: 'text/javascript' });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  a.href       = url;
  a.download   = `${fname}.js`;
  a.click();
  URL.revokeObjectURL(url);
}

// Keep old downloadJson as alias for compatibility
function downloadJson() { downloadJs(); }

// ── EXAMPLES ──────────────────────────────────────────────────────
function loadExample(key) {
  document.getElementById('yaml-input').value = EXAMPLES[key];
  parseAndRender();
}

// ── LIVE PARSE on input (debounced) ───────────────────────────────
let debounceTimer;
document.getElementById('yaml-input').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const val = document.getElementById('yaml-input').value.trim();
    if (val.length > 20) parseAndRender();
  }, 800);
});

// ── KEYBOARD SHORTCUT ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    parseAndRender();
  }
});
</script>
